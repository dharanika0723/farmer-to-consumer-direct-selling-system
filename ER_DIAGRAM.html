<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ER Diagram – Farmer to Consumer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=JetBrains+Mono:wght@400;600&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0c1a0d;
    font-family: 'JetBrains Mono', monospace;
    min-height: 100vh;
    display: flex; flex-direction: column; align-items: center;
    padding: 40px 20px;
  }
  h1 {
    font-family: 'Playfair Display', serif;
    color: #a8e063;
    font-size: 2rem;
    letter-spacing: 2px;
    margin-bottom: 6px;
    text-align: center;
  }
  .subtitle {
    color: #4a7a2a;
    font-size: 0.75rem;
    letter-spacing: 5px;
    text-transform: uppercase;
    margin-bottom: 40px;
  }
  .wrap {
    background: #0f1f10;
    border: 1px solid #2a4a1e;
    border-radius: 16px;
    padding: 20px;
    box-shadow: 0 0 80px #1a3a0a44;
    overflow-x: auto;
    width: 100%;
    max-width: 1100px;
  }
</style>
</head>
<body>
<h1>🗂️ ER Diagram</h1>
<p class="subtitle">Farmer to Consumer Direct Selling System</p>
<div class="wrap">
<svg viewBox="0 0 1060 780" xmlns="http://www.w3.org/2000/svg" width="100%"
     style="font-family:'JetBrains Mono',monospace;">

  <rect width="1060" height="780" fill="#0f1f10" rx="12"/>

  <!-- ══════════ ENTITY: farmers ══════════ -->
  <g id="farmers">
    <rect x="30" y="100" width="200" height="320" rx="10"
          fill="#0a1f0a" stroke="#4caf50" stroke-width="2"/>
    <rect x="30" y="100" width="200" height="38" rx="10" fill="#1e3a1e"/>
    <rect x="30" y="124" width="200" height="14" fill="#1e3a1e"/>
    <text x="130" y="126" text-anchor="middle" fill="#a8e063" font-size="13" font-weight="600">farmers</text>

    <text x="45" y="158" fill="#f0f0f0" font-size="11">🔑 farmer_id (PK)</text>
    <text x="45" y="178" fill="#cccccc" font-size="11">   full_name</text>
    <text x="45" y="198" fill="#cccccc" font-size="11">   email</text>
    <text x="45" y="218" fill="#cccccc" font-size="11">   password</text>
    <text x="45" y="238" fill="#cccccc" font-size="11">   phone</text>
    <text x="45" y="258" fill="#cccccc" font-size="11">   address</text>
    <text x="45" y="278" fill="#cccccc" font-size="11">   farm_name</text>
    <text x="45" y="298" fill="#cccccc" font-size="11">   profile_pic</text>
    <text x="45" y="318" fill="#cccccc" font-size="11">   created_at</text>
    <text x="45" y="338" fill="#cccccc" font-size="11">   updated_at</text>

    <!-- dividers -->
    <line x1="30" y1="145" x2="230" y2="145" stroke="#2e5e1e" stroke-width="1"/>
    <line x1="30" y1="165" x2="230" y2="165" stroke="#1a3a1a" stroke-width="0.5"/>
  </g>

  <!-- ══════════ ENTITY: consumers ══════════ -->
  <g id="consumers">
    <rect x="820" y="100" width="210" height="300" rx="10"
          fill="#1f1f0a" stroke="#f4c542" stroke-width="2"/>
    <rect x="820" y="100" width="210" height="38" rx="10" fill="#3a3a0a"/>
    <rect x="820" y="124" width="210" height="14" fill="#3a3a0a"/>
    <text x="925" y="126" text-anchor="middle" fill="#f4d97a" font-size="13" font-weight="600">consumers</text>

    <text x="835" y="158" fill="#f0f0f0" font-size="11">🔑 consumer_id (PK)</text>
    <text x="835" y="178" fill="#cccccc" font-size="11">   full_name</text>
    <text x="835" y="198" fill="#cccccc" font-size="11">   email</text>
    <text x="835" y="218" fill="#cccccc" font-size="11">   password</text>
    <text x="835" y="238" fill="#cccccc" font-size="11">   phone</text>
    <text x="835" y="258" fill="#cccccc" font-size="11">   address</text>
    <text x="835" y="278" fill="#cccccc" font-size="11">   profile_pic</text>
    <text x="835" y="298" fill="#cccccc" font-size="11">   created_at</text>
    <text x="835" y="318" fill="#cccccc" font-size="11">   updated_at</text>

    <line x1="820" y1="145" x2="1030" y2="145" stroke="#5e5a0a" stroke-width="1"/>
    <line x1="820" y1="165" x2="1030" y2="165" stroke="#3a3a0a" stroke-width="0.5"/>
  </g>

  <!-- ══════════ ENTITY: categories ══════════ -->
  <g id="categories">
    <rect x="30" y="500" width="200" height="180" rx="10"
          fill="#0a1520" stroke="#88c0d0" stroke-width="2"/>
    <rect x="30" y="500" width="200" height="38" rx="10" fill="#0a2030"/>
    <rect x="30" y="524" width="200" height="14" fill="#0a2030"/>
    <text x="130" y="526" text-anchor="middle" fill="#88c0d0" font-size="13" font-weight="600">categories</text>

    <text x="45" y="558" fill="#f0f0f0" font-size="11">🔑 category_id (PK)</text>
    <text x="45" y="578" fill="#cccccc" font-size="11">   category_name</text>
    <text x="45" y="598" fill="#cccccc" font-size="11">   description</text>
    <text x="45" y="618" fill="#cccccc" font-size="11">   created_at</text>

    <line x1="30" y1="545" x2="230" y2="545" stroke="#1a4060" stroke-width="1"/>
    <line x1="30" y1="565" x2="230" y2="565" stroke="#0a2030" stroke-width="0.5"/>
  </g>

  <!-- ══════════ ENTITY: products ══════════ -->
  <g id="products">
    <rect x="390" y="80" width="210" height="320" rx="10"
          fill="#1a1a0a" stroke="#e6c73a" stroke-width="2"/>
    <rect x="390" y="80" width="210" height="38" rx="10" fill="#303010"/>
    <rect x="390" y="104" width="210" height="14" fill="#303010"/>
    <text x="495" y="106" text-anchor="middle" fill="#e6d06a" font-size="13" font-weight="600">products</text>

    <text x="405" y="138" fill="#f0f0f0" font-size="11">🔑 product_id (PK)</text>
    <text x="405" y="158" fill="#88aacc" font-size="11">🔗 farmer_id (FK)</text>
    <text x="405" y="178" fill="#88aacc" font-size="11">🔗 category_id (FK)</text>
    <text x="405" y="198" fill="#cccccc" font-size="11">   product_name</text>
    <text x="405" y="218" fill="#cccccc" font-size="11">   description</text>
    <text x="405" y="238" fill="#cccccc" font-size="11">   price</text>
    <text x="405" y="258" fill="#cccccc" font-size="11">   quantity</text>
    <text x="405" y="278" fill="#cccccc" font-size="11">   unit</text>
    <text x="405" y="298" fill="#cccccc" font-size="11">   image</text>
    <text x="405" y="318" fill="#cccccc" font-size="11">   status</text>
    <text x="405" y="338" fill="#cccccc" font-size="11">   created_at</text>
    <text x="405" y="358" fill="#cccccc" font-size="11">   updated_at</text>

    <line x1="390" y1="125" x2="600" y2="125" stroke="#504010" stroke-width="1"/>
    <line x1="390" y1="145" x2="600" y2="145" stroke="#303010" stroke-width="0.5"/>
  </g>

  <!-- ══════════ ENTITY: orders ══════════ -->
  <g id="orders">
    <rect x="390" y="480" width="210" height="240" rx="10"
          fill="#1a0a0a" stroke="#e06060" stroke-width="2"/>
    <rect x="390" y="480" width="210" height="38" rx="10" fill="#300a0a"/>
    <rect x="390" y="504" width="210" height="14" fill="#300a0a"/>
    <text x="495" y="506" text-anchor="middle" fill="#e08080" font-size="13" font-weight="600">orders</text>

    <text x="405" y="538" fill="#f0f0f0" font-size="11">🔑 order_id (PK)</text>
    <text x="405" y="558" fill="#88aacc" font-size="11">🔗 consumer_id (FK)</text>
    <text x="405" y="578" fill="#cccccc" font-size="11">   total_amount</text>
    <text x="405" y="598" fill="#cccccc" font-size="11">   delivery_address</text>
    <text x="405" y="618" fill="#cccccc" font-size="11">   order_status</text>
    <text x="405" y="638" fill="#cccccc" font-size="11">   payment_status</text>
    <text x="405" y="658" fill="#cccccc" font-size="11">   order_date</text>
    <text x="405" y="678" fill="#cccccc" font-size="11">   updated_at</text>

    <line x1="390" y1="525" x2="600" y2="525" stroke="#501010" stroke-width="1"/>
    <line x1="390" y1="545" x2="600" y2="545" stroke="#300a0a" stroke-width="0.5"/>
  </g>

  <!-- ══════════ ENTITY: order_items ══════════ -->
  <g id="order_items">
    <rect x="700" y="480" width="210" height="220" rx="10"
          fill="#0a150a" stroke="#80c080" stroke-width="2"/>
    <rect x="700" y="480" width="210" height="38" rx="10" fill="#102010"/>
    <rect x="700" y="504" width="210" height="14" fill="#102010"/>
    <text x="805" y="506" text-anchor="middle" fill="#90d090" font-size="13" font-weight="600">order_items</text>

    <text x="715" y="538" fill="#f0f0f0" font-size="11">🔑 item_id (PK)</text>
    <text x="715" y="558" fill="#88aacc" font-size="11">🔗 order_id (FK)</text>
    <text x="715" y="578" fill="#88aacc" font-size="11">🔗 product_id (FK)</text>
    <text x="715" y="598" fill="#88aacc" font-size="11">🔗 farmer_id (FK)</text>
    <text x="715" y="618" fill="#cccccc" font-size="11">   quantity</text>
    <text x="715" y="638" fill="#cccccc" font-size="11">   unit_price</text>
    <text x="715" y="658" fill="#cccccc" font-size="11">   subtotal</text>

    <line x1="700" y1="525" x2="910" y2="525" stroke="#204020" stroke-width="1"/>
    <line x1="700" y1="545" x2="910" y2="545" stroke="#102010" stroke-width="0.5"/>
  </g>

  <!-- ══════════ RELATIONSHIPS ══════════ -->

  <!-- farmers 1──< products (farmer_id) -->
  <line x1="230" y1="200" x2="390" y2="180" stroke="#a8e063" stroke-width="1.8" stroke-dasharray="none"/>
  <text x="295" y="178" fill="#a8e063" font-size="10" font-weight="600">1</text>
  <text x="370" y="178" fill="#a8e063" font-size="10" font-weight="600">M</text>
  <text x="275" y="194" fill="#666" font-size="9">LISTS</text>

  <!-- categories 1──< products (category_id) -->
  <line x1="230" y1="560" x2="390" y2="220" stroke="#88c0d0" stroke-width="1.8"/>
  <text x="270" y="510" fill="#88c0d0" font-size="10" font-weight="600">1</text>
  <text x="370" y="215" fill="#88c0d0" font-size="10" font-weight="600">M</text>
  <text x="280" y="480" fill="#666" font-size="9">HAS</text>

  <!-- consumers 1──< orders (consumer_id) -->
  <line x1="820" y1="250" x2="600" y2="570" stroke="#f4c542" stroke-width="1.8"/>
  <text x="790" y="285" fill="#f4c542" font-size="10" font-weight="600">1</text>
  <text x="608" y="565" fill="#f4c542" font-size="10" font-weight="600">M</text>
  <text x="720" y="435" fill="#666" font-size="9">PLACES</text>

  <!-- orders 1──< order_items (order_id) -->
  <line x1="600" y1="600" x2="700" y2="590" stroke="#e06060" stroke-width="1.8"/>
  <text x="610" y="595" fill="#e06060" font-size="10" font-weight="600">1</text>
  <text x="688" y="585" fill="#e06060" font-size="10" font-weight="600">M</text>
  <text x="635" y="610" fill="#666" font-size="9">CONTAINS</text>

  <!-- products 1──< order_items (product_id) -->
  <line x1="495" y1="400" x2="760" y2="480" stroke="#e6c73a" stroke-width="1.8"/>
  <text x="500" y="420" fill="#e6c73a" font-size="10" font-weight="600">1</text>
  <text x="750" y="478" fill="#e6c73a" font-size="10" font-weight="600">M</text>
  <text x="580" y="452" fill="#666" font-size="9">IN</text>

  <!-- farmers 1──< order_items (farmer_id) -->
  <line x1="230" y1="260" x2="700" y2="600" stroke="#a8e063" stroke-width="1.2" stroke-dasharray="6,3" opacity="0.6"/>
  <text x="240" y="280" fill="#a8e063" font-size="10">1</text>
  <text x="692" y="596" fill="#a8e063" font-size="10">M</text>

  <!-- ══════════ LEGEND ══════════ -->
  <rect x="380" y="720" width="300" height="45" rx="8" fill="#0a1a0b" stroke="#2a4a1e" stroke-width="1"/>
  <text x="530" y="736" text-anchor="middle" fill="#5a8a3a" font-size="10" font-weight="600">LEGEND</text>
  <line x1="395" y1="748" x2="430" y2="748" stroke="#aaa" stroke-width="1.5"/>
  <text x="438" y="752" fill="#aaa" font-size="9">Relationship</text>
  <line x1="510" y1="748" x2="545" y2="748" stroke="#aaa" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="553" y="752" fill="#aaa" font-size="9">Indirect FK</text>
  <text x="395" y="760" fill="#88aacc" font-size="9">🔗 = Foreign Key</text>
  <text x="510" y="760" fill="#f0f0f0" font-size="9">🔑 = Primary Key</text>

</svg>
</div>
</body>
</html>
