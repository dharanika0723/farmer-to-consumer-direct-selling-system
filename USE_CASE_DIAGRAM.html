<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Use Case Diagram – Farmer to Consumer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Source+Code+Pro:wght@400;600&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0d1f0e;
    font-family: 'Source Code Pro', monospace;
    display: flex; flex-direction: column; align-items: center;
    padding: 40px 20px;
    min-height: 100vh;
  }
  h1 {
    font-family: 'Playfair Display', serif;
    color: #a8e063;
    font-size: 2rem;
    letter-spacing: 2px;
    margin-bottom: 6px;
    text-align: center;
  }
  .subtitle {
    color: #5a8a3a;
    font-size: 0.8rem;
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-bottom: 40px;
  }
  .diagram-wrap {
    background: #111f12;
    border: 1px solid #2a4a1e;
    border-radius: 16px;
    padding: 30px;
    box-shadow: 0 0 60px #1a3a0a55;
    width: 100%;
    max-width: 960px;
  }
  svg text { font-family: 'Source Code Pro', monospace; }
</style>
</head>
<body>
<h1>🌾 Use Case Diagram</h1>
<p class="subtitle">Farmer to Consumer Direct Selling System</p>
<div class="diagram-wrap">
<svg viewBox="0 0 920 700" xmlns="http://www.w3.org/2000/svg" width="100%">

  <!-- Background -->
  <rect width="920" height="700" fill="#111f12" rx="12"/>

  <!-- System boundary -->
  <rect x="200" y="60" width="520" height="590" rx="14"
        fill="#0a1a0b" stroke="#2e5e1e" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="460" y="90" text-anchor="middle" fill="#5a8a3a" font-size="13" font-weight="600" letter-spacing="3">
    FARMER TO CONSUMER DIRECT SELLING SYSTEM
  </text>

  <!-- ───── ACTORS ───── -->
  <!-- Farmer actor (left) -->
  <circle cx="80" cy="200" r="22" fill="none" stroke="#a8e063" stroke-width="2"/>
  <line x1="80" y1="222" x2="80" y2="280" stroke="#a8e063" stroke-width="2"/>
  <line x1="80" y1="245" x2="50" y2="265" stroke="#a8e063" stroke-width="2"/>
  <line x1="80" y1="245" x2="110" y2="265" stroke="#a8e063" stroke-width="2"/>
  <line x1="80" y1="280" x2="55" y2="310" stroke="#a8e063" stroke-width="2"/>
  <line x1="80" y1="280" x2="105" y2="310" stroke="#a8e063" stroke-width="2"/>
  <text x="80" y="330" text-anchor="middle" fill="#a8e063" font-size="13" font-weight="600">🧑‍🌾 Farmer</text>

  <!-- Consumer actor (right) -->
  <circle cx="840" cy="200" r="22" fill="none" stroke="#f4c542" stroke-width="2"/>
  <line x1="840" y1="222" x2="840" y2="280" stroke="#f4c542" stroke-width="2"/>
  <line x1="840" y1="245" x2="810" y2="265" stroke="#f4c542" stroke-width="2"/>
  <line x1="840" y1="245" x2="870" y2="265" stroke="#f4c542" stroke-width="2"/>
  <line x1="840" y1="280" x2="815" y2="310" stroke="#f4c542" stroke-width="2"/>
  <line x1="840" y1="280" x2="865" y2="310" stroke="#f4c542" stroke-width="2"/>
  <text x="840" y="330" text-anchor="middle" fill="#f4c542" font-size="13" font-weight="600">🛒 Consumer</text>

  <!-- Admin actor (bottom-left) -->
  <circle cx="80" cy="540" r="22" fill="none" stroke="#88c0d0" stroke-width="2"/>
  <line x1="80" y1="562" x2="80" y2="620" stroke="#88c0d0" stroke-width="2"/>
  <line x1="80" y1="585" x2="50" y2="605" stroke="#88c0d0" stroke-width="2"/>
  <line x1="80" y1="585" x2="110" y2="605" stroke="#88c0d0" stroke-width="2"/>
  <line x1="80" y1="620" x2="55" y2="650" stroke="#88c0d0" stroke-width="2"/>
  <line x1="80" y1="620" x2="105" y2="650" stroke="#88c0d0" stroke-width="2"/>
  <text x="80" y="668" text-anchor="middle" fill="#88c0d0" font-size="13" font-weight="600">🛡️ Admin</text>

  <!-- ───── USE CASES (ellipses) ───── -->

  <!-- Shared -->
  <ellipse cx="460" cy="145" rx="110" ry="26" fill="#1a3a1a" stroke="#4caf50" stroke-width="1.5"/>
  <text x="460" y="150" text-anchor="middle" fill="#a8e063" font-size="12">Register / Login</text>

  <!-- Farmer use cases -->
  <ellipse cx="340" cy="230" rx="110" ry="26" fill="#1a3a1a" stroke="#4caf50" stroke-width="1.5"/>
  <text x="340" y="235" text-anchor="middle" fill="#a8e063" font-size="12">Add Product</text>

  <ellipse cx="340" cy="310" rx="110" ry="26" fill="#1a3a1a" stroke="#4caf50" stroke-width="1.5"/>
  <text x="340" y="315" text-anchor="middle" fill="#a8e063" font-size="12">View My Products</text>

  <ellipse cx="340" cy="390" rx="110" ry="26" fill="#1a3a1a" stroke="#4caf50" stroke-width="1.5"/>
  <text x="340" y="395" text-anchor="middle" fill="#a8e063" font-size="12">Update / Delete Product</text>

  <ellipse cx="340" cy="470" rx="110" ry="26" fill="#1a3a1a" stroke="#4caf50" stroke-width="1.5"/>
  <text x="340" y="475" text-anchor="middle" fill="#a8e063" font-size="12">View Received Orders</text>

  <!-- Consumer use cases -->
  <ellipse cx="590" cy="230" rx="110" ry="26" fill="#2a2a0a" stroke="#f4c542" stroke-width="1.5"/>
  <text x="590" y="235" text-anchor="middle" fill="#f4d97a" font-size="12">Browse Products</text>

  <ellipse cx="590" cy="310" rx="110" ry="26" fill="#2a2a0a" stroke="#f4c542" stroke-width="1.5"/>
  <text x="590" y="315" text-anchor="middle" fill="#f4d97a" font-size="12">Place Order</text>

  <ellipse cx="590" cy="390" rx="110" ry="26" fill="#2a2a0a" stroke="#f4c542" stroke-width="1.5"/>
  <text x="590" y="395" text-anchor="middle" fill="#f4d97a" font-size="12">View Order History</text>

  <ellipse cx="590" cy="470" rx="110" ry="26" fill="#2a2a0a" stroke="#f4c542" stroke-width="1.5"/>
  <text x="590" y="475" text-anchor="middle" fill="#f4d97a" font-size="12">Cancel Order</text>

  <!-- Admin use cases -->
  <ellipse cx="460" cy="570" rx="110" ry="26" fill="#0a1a2a" stroke="#88c0d0" stroke-width="1.5"/>
  <text x="460" y="575" text-anchor="middle" fill="#88c0d0" font-size="12">Manage Users &amp; Products</text>

  <ellipse cx="460" cy="630" rx="110" ry="26" fill="#0a1a2a" stroke="#88c0d0" stroke-width="1.5"/>
  <text x="460" y="635" text-anchor="middle" fill="#88c0d0" font-size="12">View All Orders</text>

  <!-- ───── ASSOCIATIONS ───── -->
  <!-- Farmer → use cases -->
  <line x1="102" y1="200" x2="230" y2="145" stroke="#a8e063" stroke-width="1.2" opacity="0.7"/>
  <line x1="102" y1="210" x2="230" y2="230" stroke="#a8e063" stroke-width="1.2" opacity="0.7"/>
  <line x1="102" y1="230" x2="230" y2="310" stroke="#a8e063" stroke-width="1.2" opacity="0.7"/>
  <line x1="102" y1="250" x2="230" y2="390" stroke="#a8e063" stroke-width="1.2" opacity="0.7"/>
  <line x1="102" y1="265" x2="230" y2="470" stroke="#a8e063" stroke-width="1.2" opacity="0.7"/>

  <!-- Consumer → use cases -->
  <line x1="818" y1="200" x2="700" y2="145" stroke="#f4c542" stroke-width="1.2" opacity="0.7"/>
  <line x1="818" y1="210" x2="700" y2="230" stroke="#f4c542" stroke-width="1.2" opacity="0.7"/>
  <line x1="818" y1="230" x2="700" y2="310" stroke="#f4c542" stroke-width="1.2" opacity="0.7"/>
  <line x1="818" y1="250" x2="700" y2="390" stroke="#f4c542" stroke-width="1.2" opacity="0.7"/>
  <line x1="818" y1="265" x2="700" y2="470" stroke="#f4c542" stroke-width="1.2" opacity="0.7"/>

  <!-- Admin → use cases -->
  <line x1="102" y1="540" x2="350" y2="570" stroke="#88c0d0" stroke-width="1.2" opacity="0.7"/>
  <line x1="102" y1="555" x2="350" y2="630" stroke="#88c0d0" stroke-width="1.2" opacity="0.7"/>

  <!-- «include» Place Order → View Products (dashed) -->
  <line x1="590" y1="284" x2="590" y2="256" stroke="#f4c542" stroke-width="1" stroke-dasharray="5,3" opacity="0.5"/>
  <text x="600" y="273" fill="#aaaaaa" font-size="9">«include»</text>

  <!-- Legend -->
  <rect x="660" y="580" width="220" height="85" rx="8" fill="#0a1a0b" stroke="#2a4a1e" stroke-width="1"/>
  <text x="770" y="600" text-anchor="middle" fill="#5a8a3a" font-size="11" font-weight="600">LEGEND</text>
  <ellipse cx="685" cy="618" rx="12" ry="7" fill="#1a3a1a" stroke="#4caf50" stroke-width="1.2"/>
  <text x="702" y="622" fill="#a8e063" font-size="10">Farmer Use Case</text>
  <ellipse cx="685" cy="638" rx="12" ry="7" fill="#2a2a0a" stroke="#f4c542" stroke-width="1.2"/>
  <text x="702" y="642" fill="#f4d97a" font-size="10">Consumer Use Case</text>
  <ellipse cx="685" cy="658" rx="12" ry="7" fill="#0a1a2a" stroke="#88c0d0" stroke-width="1.2"/>
  <text x="702" y="662" fill="#88c0d0" font-size="10">Admin Use Case</text>
</svg>
</div>
</body>
</html>
